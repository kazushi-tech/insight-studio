<body class="bg-background font-body text-on-surface min-h-screen flex flex-col overflow-hidden">
<!-- TopAppBar -->
<header class="flex justify-center items-center py-8 w-full bg-transparent top-0 z-50">
<div class="font-manrope text-sm tracking-tight text-[#f2c35b] flex items-center gap-2">
<span class="text-2xl font-bold tracking-tighter text-[#f2c35b]">Insight Studio</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center relative px-6">
<!-- Abstract Background Decorative Elements -->
<div class="absolute top-1/4 left-1/4 w-96 h-96 bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-1/4 right-1/4 w-[500px] h-[500px] bg-tertiary-container/5 rounded-full blur-[150px]"></div>
<!-- Login Card -->
<div class="w-full max-w-[440px] bg-surface-container-low rounded-xl p-10 relative z-10">
<div class="mb-10 text-center md:text-left">
<h1 class="text-[2.75rem] font-extrabold leading-tight tracking-[-0.02em] text-on-surface mb-2">おかえりなさい</h1>
<p class="text-on-surface-variant body-md">アカウント情報を入力してログインしてください。</p>
</div>
<form class="space-y-6">
<!-- Email Field with Error State -->
<div class="space-y-2">
<label class="block label-md text-on-surface-variant px-1">メールアドレス</label>
<div class="relative group">
<input class="w-full h-[48px] px-4 bg-surface-container-highest border border-error-container rounded-lg focus:outline-none focus:border-primary text-on-surface transition-all duration-200" placeholder="name@company.com" type="email" value="user@example.com"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-error">
<span class="material-symbols-outlined text-xl">error</span>
</div>
</div>
</div>
<!-- Password Field with Error State -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="label-md text-on-surface-variant">パスワード</label>
<a class="text-xs text-primary hover:opacity-80 transition-opacity" href="#">パスワードを忘れましたか？</a>
</div>
<div class="relative group">
<input class="w-full h-[48px] px-4 bg-surface-container-highest border border-error-container rounded-lg focus:outline-none focus:border-primary text-on-surface transition-all duration-200" placeholder="••••••••" type="password" value="********"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2 text-error">
<span class="material-symbols-outlined text-xl">error</span>
</div>
</div>
</div>
<!-- Remember Me Toggle -->
<div class="flex items-center gap-3 px-1">
<div class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox"/>
<div class="w-10 h-5 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:bg-primary-container"></div>
</div>
<span class="text-xs text-on-surface-variant">ログイン状態を保持する</span>
</div>
<!-- Error Message -->
<div class="flex items-start gap-2 p-3 bg-error-container/20 rounded-lg text-error">
<span class="material-symbols-outlined text-sm mt-0.5">info</span>
<p class="text-xs font-medium leading-relaxed">メールアドレスまたはパスワードが正しくありません</p>
</div>
<button class="w-full h-[48px] gold-gradient rounded-lg text-on-primary font-bold text-sm tracking-wide shadow-lg shadow-primary/10 hover:opacity-90 active:scale-95 transition-all duration-150 mt-4" type="submit">
                    ログイン
                </button>
</form>
<!-- Social Login Divider -->
<div class="relative my-10">
<div class="absolute inset-0 flex items-center">
<div class="w-full h-px bg-outline-variant/10"></div>
</div>
<div class="relative flex justify-center text-xs uppercase">
<span class="px-4 bg-surface-container-low text-on-surface-variant font-medium tracking-widest">または</span>
</div>
</div>
<!-- SSO Options -->
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center gap-2 h-[48px] rounded-lg border border-outline-variant/10 hover:bg-surface-container-highest transition-colors">
<img alt="Google Logo" class="w-4 h-4 opacity-70" data-alt="minimalist clean google logo icon on transparent background" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBhOV1EC15arGDQeb4Lf-ABih8oQtWe5pX0AxlbUh0wDJYiq2ucAd32JN8fMakOad2u1T386o0VVuzvmdN-abWV3HErDyOhv6M1vFBGfrAULAyXeJAI1jowi704X3BylD4xBXLhU9xpfdl--LFtqS4CclTx3JEzBO2hQAZ3SFgOZu6HCVsoiy-4JjOsCfkxyzP7BVTdXWQOGSP0x8wnnHP4b53VLo5u-Xl11EgeM8DqK3tv0VNnPPrvv6hI8k0OlWn1y4s0QHbKMjXt"/>
<span class="text-xs font-semibold">Google</span>
</button>
<button class="flex items-center justify-center gap-2 h-[48px] rounded-lg border border-outline-variant/10 hover:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-lg opacity-70">terminal</span>
<span class="text-xs font-semibold">SSO Login</span>
</button>
</div>
</div>
</main>
<!-- Footer -->
<footer class="fixed bottom-0 w-full flex justify-between px-12 py-6 bg-transparent">
<div class="text-sm font-semibold text-[#f2c35b] opacity-80 hover:opacity-100 transition-opacity cursor-default">Insight Studio</div>
<div class="flex gap-8">

<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80" href="#">Terms of Service</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80" href="#">Support</a>
