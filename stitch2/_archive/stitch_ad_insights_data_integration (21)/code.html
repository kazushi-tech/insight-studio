<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@200;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary": "#002e6a",
                        "on-error-container": "#ffdad6",
                        "tertiary-fixed": "#d8e2ff",
                        "secondary-fixed-dim": "#ddc393",
                        "surface-container-high": "#28283d",
                        "primary": "#f2c35b",
                        "secondary": "#ddc393",
                        "error": "#ffb4ab",
                        "on-secondary-container": "#ceb586",
                        "tertiary-container": "#8eaef4",
                        "on-error": "#690005",
                        "on-tertiary-fixed": "#001a42",
                        "inverse-primary": "#795900",
                        "on-primary-container": "#553e00",
                        "background": "#111125",
                        "tertiary-fixed-dim": "#aec6ff",
                        "outline": "#9a8f7d",
                        "surface-container-highest": "#333348",
                        "surface-container": "#1e1e32",
                        "secondary-fixed": "#fadfad",
                        "on-primary": "#402d00",
                        "inverse-on-surface": "#2f2e43",
                        "surface-bright": "#37374d",
                        "primary-fixed-dim": "#eec058",
                        "surface-container-low": "#1a1a2e",
                        "on-surface": "#e2e0fc",
                        "outline-variant": "#4e4636",
                        "secondary-container": "#584721",
                        "on-primary-fixed": "#261a00",
                        "on-background": "#e2e0fc",
                        "surface-variant": "#333348",
                        "primary-fixed": "#ffdf9f",
                        "on-secondary-fixed": "#261a00",
                        "primary-container": "#d4a843",
                        "surface": "#111125",
                        "error-container": "#93000a",
                        "on-secondary": "#3d2e0a",
                        "tertiary": "#b3caff",
                        "on-tertiary-container": "#1b407f",
                        "surface-dim": "#111125",
                        "on-surface-variant": "#d2c5b1",
                        "inverse-surface": "#e2e0fc",
                        "on-primary-fixed-variant": "#5b4300",
                        "on-tertiary-fixed-variant": "#214584",
                        "surface-tint": "#eec058",
                        "surface-container-lowest": "#0c0c1f",
                        "on-secondary-fixed-variant": "#56441f"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "fontFamily": {
                        "headline": ["Manrope"],
                        "body": ["Manrope"],
                        "label": ["Manrope"]
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .focused-ring {
            box-shadow: 0 0 0 4px rgba(212, 168, 67, 0.2);
        }
    </style>
</head>
<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col overflow-hidden">
<header class="flex justify-center items-center py-8 w-full top-0">
<div class="text-2xl font-bold tracking-tighter text-[#f2c35b]">
            Insight Studio
        </div>
</header>
<main class="flex-grow flex items-center justify-center px-6 relative">
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-primary/5 blur-[120px] rounded-full"></div>
<div class="absolute bottom-[-5%] right-[-5%] w-[30%] h-[30%] bg-tertiary/5 blur-[100px] rounded-full"></div>
</div>
<div class="z-10 w-full max-w-[440px]">
<div class="bg-surface-container-low p-10 rounded-xl">
<div class="mb-10 text-left">
<h1 class="text-[2.75rem] font-extrabold tracking-tight text-on-surface leading-tight mb-2">
                        おかえりなさい
                    </h1>
<p class="text-on-surface-variant font-medium">
                        継続するにはログインしてください
                    </p>
</div>
<form class="space-y-6">
<div class="space-y-2">
<label class="block text-[0.875rem] font-medium text-on-surface-variant ml-1">
                            メールアドレス
                        </label>
<div class="relative group">
<input autofocus="" class="w-full h-[48px] px-4 rounded-lg bg-surface-container-highest border border-transparent text-on-surface placeholder:text-slate-600 transition-all duration-200 outline-none focused-ring border-primary" placeholder="name@company.com" type="email"/>
</div>
</div>
<div class="space-y-2">
<div class="flex justify-between items-center ml-1">
<label class="block text-[0.875rem] font-medium text-on-surface-variant">
                                パスワード
                            </label>
<a class="text-[0.75rem] font-bold text-primary hover:opacity-80 transition-opacity" href="#">
                                パスワードを忘れた場合
                            </a>
</div>
<div class="relative">
<input class="w-full h-[48px] px-4 rounded-lg bg-surface-container-highest border border-transparent text-on-surface focus:bg-surface-bright transition-all duration-200 outline-none" type="password"/>
</div>
</div>
<button class="w-full h-[48px] mt-4 rounded-lg bg-gradient-to-br from-[#f2c35b] to-[#d4a843] text-on-primary font-bold text-[1rem] hover:opacity-90 active:scale-[0.98] transition-all" type="submit">
                        ログイン
                    </button>
<div class="relative py-4 flex items-center gap-4">
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
<span class="text-[0.75rem] uppercase tracking-widest text-on-surface-variant font-bold">または</span>
<div class="flex-grow h-[1px] bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="flex items-center justify-center h-[48px] rounded-lg border border-outline-variant/10 hover:bg-surface-container-high transition-colors text-on-surface" type="button">
<span class="material-symbols-outlined mr-2">google</span>
<span class="text-sm font-semibold">Google</span>
</button>
<button class="flex items-center justify-center h-[48px] rounded-lg border border-outline-variant/10 hover:bg-surface-container-high transition-colors text-on-surface" type="button">
<span class="material-symbols-outlined mr-2">hub</span>
<span class="text-sm font-semibold">SSO</span>
</button>
</div>
</form>
<div class="mt-8 text-center">
<p class="text-on-surface-variant text-[0.875rem]">
                        アカウントをお持ちでないですか？ 
                        <a class="text-primary font-bold ml-1 hover:underline" href="#">新規登録</a>
</p>
</div>
</div>
</div>
</main>
<footer class="fixed bottom-0 w-full flex justify-between px-12 py-6 z-20">
<div class="text-sm font-semibold text-[#f2c35b]">
            Insight Studio
        </div>
<div class="flex gap-8">
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity" href="#">Privacy Policy</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity" href="#">Terms of Service</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity" href="#">Support</a>
</div>
<div class="font-manrope text-xs uppercase tracking-widest text-slate-500 opacity-80">
            © 2024 Insight Studio. All rights reserved.
        </div>
</footer>
</body></html>
