<!DOCTYPE html>

<html class="dark" lang="ja"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Insight Studio - ログイン中</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "on-tertiary": "#002e6a",
                    "on-error-container": "#ffdad6",
                    "tertiary-fixed": "#d8e2ff",
                    "secondary-fixed-dim": "#ddc393",
                    "surface-container-high": "#28283d",
                    "primary": "#f2c35b",
                    "secondary": "#ddc393",
                    "error": "#ffb4ab",

                    "on-error": "#690005",
                    "on-tertiary-fixed": "#001a42",
                    "inverse-primary": "#795900",
                    "on-primary-container": "#553e00",
                    "background": "#111125",
                    "tertiary-fixed-dim": "#aec6ff",
                    "outline": "#9a8f7d",
                    "surface-container-highest": "#333348",
                    "surface-container": "#1e1e32",
                    "secondary-fixed": "#fadfad",
                    "on-primary": "#402d00",
                    "inverse-on-surface": "#2f2e43",
                    "surface-bright": "#37374d",
                    "primary-fixed-dim": "#eec058",
                    "surface-container-low": "#1a1a2e",
                    "on-surface": "#e2e0fc",
                    "outline-variant": "#4e4636",
                    "secondary-container": "#584721",
                    "on-primary-fixed": "#261a00",
                    "on-background": "#e2e0fc",
                    "surface-variant": "#333348",
                    "primary-fixed": "#ffdf9f",
                    "on-secondary-fixed": "#261a00",
                    "primary-container": "#d4a843",
                    "surface": "#111125",
                    "error-container": "#93000a",
                    "on-secondary": "#3d2e0a",
                    "tertiary": "#b3caff",
                    "on-tertiary-container": "#1b407f",
                    "surface-dim": "#111125",
                    "on-surface-variant": "#d2c5b1",
                    "inverse-surface": "#e2e0fc",
                    "on-primary-fixed-variant": "#5b4300",
                    "on-tertiary-fixed-variant": "#214584",
                    "surface-tint": "#eec058",
                    "surface-container-lowest": "#0c0c1f",
                    "on-secondary-fixed-variant": "#56441f"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Manrope"],
                    "label": ["Manrope"]
            }
          },
        },
      }
    </script>
<style>
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #111125;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .loading-spinner {
            border: 3px solid rgba(64, 45, 0, 0.2);
            border-top: 3px solid #402d00;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .glass-panel {
            background: rgba(26, 26, 46, 0.6);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
</head>
<body class="text-on-surface min-h-screen flex flex-col items-center selection:bg-primary selection:text-on-primary">
<header class="flex justify-center items-center py-8 w-full top-0">
<div class="text-2xl font-bold tracking-tighter text-[#f2c35b]">
            Insight Studio
        </div>
</header>
<main class="flex-grow flex items-center justify-center w-full px-6">
<div class="w-full max-w-md">
<!-- Login Card -->
<div class="surface-container-low p-10 lg:rounded-lg glass-panel relative overflow-hidden">
<div class="mb-10 text-center">
<h1 class="text-[2.75rem] font-extrabold tracking-tight leading-tight mb-2 text-on-surface">
                        おかえりなさい
                    </h1>
<p class="text-on-surface-variant body-md">
                        インサイトスタジオへログインしてください
                    </p>
</div>
<form class="space-y-6">
<!-- Email Field (Disabled/Populated) -->
<div class="space-y-2 opacity-50 cursor-not-allowed">
<label class="block label-md text-on-surface-variant ml-1">メールアドレス</label>
<div class="relative group">
<input class="w-full h-12 px-4 bg-surface-container-highest border-0 rounded-lg text-on-surface focus:ring-0 cursor-not-allowed" disabled="" type="email" value="executive@insightstudio.jp"/>
<span class="material-symbols-outlined absolute right-4 top-3 text-outline opacity-50">
                                mail
                            </span>
</div>
</div>
<!-- Password Field (Disabled/Populated) -->
<div class="space-y-2 opacity-50 cursor-not-allowed">
<label class="block label-md text-on-surface-variant ml-1">パスワード</label>
<div class="relative group">
<input class="w-full h-12 px-4 bg-surface-container-highest border-0 rounded-lg text-on-surface focus:ring-0 cursor-not-allowed" disabled="" type="password" value="••••••••••••"/>
<span class="material-symbols-outlined absolute right-4 top-3 text-outline opacity-50">
                                lock
                            </span>
</div>
</div>
<!-- Help Links (Disabled) -->
<div class="flex justify-between items-center text-xs opacity-40">
<div class="flex items-center gap-2">
<div class="w-4 h-4 rounded border border-outline-variant bg-surface-container-high"></div>
<span>ログイン状態を保持</span>
</div>
<a class="text-primary hover:underline pointer-events-none" href="#">パスワードを忘れた場合</a>
</div>
<!-- Login Button (Loading State) -->
<button class="w-full h-12 rounded-lg bg-gradient-to-br from-[#f2c35b] to-[#d4a843] flex items-center justify-center gap-3 transition-all duration-150 shadow-lg cursor-not-allowed" disabled="" type="button">
<div class="loading-spinner"></div>
<span class="font-bold text-on-primary">認証中...</span>
</button>
</form>
<div class="mt-10 text-center opacity-40">
<p class="text-sm text-on-surface-variant">
                        アカウントをお持ちでないですか？ 
                        <a class="text-primary font-semibold hover:underline pointer-events-none ml-1" href="#">新規登録</a>
</p>
</div>
<!-- Branding Accent -->
<div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 rounded-full -mr-16 -mt-16 blur-3xl"></div>
<div class="absolute bottom-0 left-0 w-24 h-24 bg-primary/5 rounded-full -ml-12 -mb-12 blur-2xl"></div>
</div>
<!-- SSO Options (Muted during loading) -->
<div class="mt-8 space-y-4 opacity-30">
<div class="flex items-center gap-4">
<div class="flex-grow h-px bg-outline-variant/20"></div>
<span class="label-md text-on-surface-variant uppercase tracking-widest text-[10px]">Or continue with</span>
<div class="flex-grow h-px bg-outline-variant/20"></div>
</div>
<div class="grid grid-cols-2 gap-4">
<button class="h-12 border border-outline-variant/20 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors cursor-not-allowed" disabled="">
<img alt="" class="w-5 h-5 opacity-50 grayscale" data-alt="Google colorful logo icon small scale" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBMNub_en3fJRMdHWjaTt1ltenUtcyX-bngBxVw9l3hSk-6jwK_NxMqcKZt4yfjCANqAasX4Dx-EbX7NJb_qNWtUrL7pp-7x4mmJjtOMfNtxv3poqGl4lx17DMRZWTn72CZkXMb3ct4YywzjeFuCuVGpwjEihGfoemYW29MsVZCFy3yG6-S-g02rtia6oWcLpyHnFGZ8znpyi7wlVbr6Kwqp-0cjdCfMc1R2fujzGi9yMS-4Z-V61RseocPAWoBjAWwKAsWg-NHZp-E"/>
<span class="text-sm font-medium">Google</span>
</button>
<button class="h-12 border border-outline-variant/20 rounded-lg flex items-center justify-center gap-2 hover:bg-surface-container-low transition-colors cursor-not-allowed" disabled="">
<span class="material-symbols-outlined text-xl opacity-50" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="text-sm font-medium">SSO</span>
</button>
</div>
</div>
</div>
</main>
<!-- Footer Shell -->
<footer class="fixed bottom-0 w-full flex justify-between px-12 py-6">
<div class="text-sm font-semibold text-[#f2c35b]">
            Insight Studio
        </div>
<div class="flex gap-8">
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80 hover:opacity-100" href="#">Support</a>
</div>
<div class="font-manrope text-xs uppercase tracking-widest text-slate-500">
            © 2024 Insight Studio. All rights reserved.
        </div>
</footer>
<!-- Decorative Background Elements -->
<div class="fixed inset-0 pointer-events-none -z-10 overflow-hidden">
<div class="absolute top-[10%] left-[5%] w-[500px] h-[500px] bg-primary/5 rounded-full blur-[120px]"></div>
<div class="absolute bottom-[15%] right-[5%] w-[400px] h-[400px] bg-tertiary-container/5 rounded-full blur-[100px]"></div>
</div>
</body></html>
