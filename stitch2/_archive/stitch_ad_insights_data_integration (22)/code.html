        body { font-family: 'Manrope', sans-serif; }
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface-container-lowest text-on-surface min-h-screen flex flex-col overflow-x-hidden">
<!-- Decorative Blur Gradients -->
<div class="fixed top-0 -left-[10%] w-[40%] h-full bg-surface-container-low opacity-40 blur-[120px] pointer-events-none"></div>
<div class="fixed top-0 -right-[10%] w-[40%] h-full bg-surface-container-low opacity-40 blur-[120px] pointer-events-none"></div>
<!-- Top Navigation (Restricted Shell as per JSON mapping) -->
<header class="flex justify-center items-center py-8 w-full top-0 z-50">
<div class="text-2xl font-bold tracking-tighter text-[#f2c35b]">
            Insight Studio
        </div>
</header>
<main class="flex-grow flex items-center justify-center px-6 relative z-10">
<!-- Central Login Card -->
<div class="w-full max-w-[420px] bg-surface-container-low rounded-2xl p-10 flex flex-col items-center">
<div class="mb-10 text-center">
<h1 class="text-3xl font-extrabold tracking-tight text-primary mb-2">
                    Insight Studio
                </h1>
<p class="font-label text-xs uppercase tracking-[0.2em] text-on-surface-variant font-medium">
                    AD OPS &amp; ANALYSIS
                </p>
</div>
<form class="w-full space-y-6">
<!-- Email Field -->
<div class="space-y-2">
<label class="block font-label text-xs font-semibold text-on-surface-variant ml-1">メールアドレス</label>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="w-full h-12 pl-12 pr-4 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary focus:bg-surface-bright transition-all duration-200" placeholder="example@insight.studio" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-xs font-semibold text-on-surface-variant">パスワード</label>
<a class="text-[10px] text-primary hover:underline transition-all" href="#">パスワードを忘れた場合</a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none text-on-surface-variant group-focus-within:text-primary transition-colors">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="w-full h-12 pl-12 pr-12 bg-surface-container-highest border-none rounded-xl text-on-surface placeholder:text-outline focus:ring-1 focus:ring-primary focus:bg-surface-bright transition-all duration-200" placeholder="••••••••" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-on-surface-variant hover:text-primary" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<!-- Login Button -->
<div class="pt-4">
<button class="w-full h-12 bg-gradient-to-br from-primary to-primary-container text-on-primary font-bold rounded-xl flex items-center justify-center gap-2 hover:opacity-90 active:scale-[0.98] transition-all shadow-lg shadow-surface-container-lowest/50" type="submit">
                        ログイン
                        <span class="material-symbols-outlined text-[18px]">arrow_forward</span>
</button>
</div>
<div class="text-center pt-4">
<p class="text-xs text-on-surface-variant">
                        アカウントをお持ちでないですか？ 
                        <a class="text-primary font-bold ml-1 hover:underline" href="#">新規登録</a>
</p>
</div>
</form>
</div>
</main>
<!-- Footer Shell -->
<footer class="fixed bottom-0 w-full flex justify-between px-12 py-6 z-50">
<div class="font-manrope text-xs uppercase tracking-widest text-slate-500">
            © 2024 Insight Studio. All rights reserved.
        </div>
<div class="flex gap-8">
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80 hover:opacity-100" href="#">Privacy Policy</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80 hover:opacity-100" href="#">Terms of Service</a>
<a class="font-manrope text-xs uppercase tracking-widest text-slate-500 hover:text-white transition-opacity opacity-80 hover:opacity-100" href="#">Support</a>
</div>
</footer>
